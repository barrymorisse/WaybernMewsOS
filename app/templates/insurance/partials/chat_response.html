<!-- A single Q&A exchange — appended to the chat history area via hx-swap="beforeend" -->
<div class="mb-6">
  <!-- Question -->
  <div class="flex items-start gap-3 mb-3">
    <div class="flex-shrink-0 w-7 h-7 rounded-full bg-blue-100 flex items-center justify-center mt-0.5">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    </div>
    <div class="bg-blue-50 rounded-xl px-4 py-3 text-sm text-gray-800 max-w-2xl">
      {{ question }}
    </div>
  </div>

  <!-- Answer -->
  <div class="flex items-start gap-3">
    <div class="flex-shrink-0 w-7 h-7 rounded-full bg-gray-100 flex items-center justify-center mt-0.5">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
      </svg>
    </div>
    <div class="bg-white border border-gray-200 rounded-xl px-4 py-3 text-sm text-gray-800 max-w-2xl whitespace-pre-wrap">{{ answer }}</div>
  </div>
</div>
