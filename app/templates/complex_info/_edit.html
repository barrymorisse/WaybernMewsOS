<form
  hx-post="/complex-info"
  hx-target="#complex-info-panel"
  hx-swap="innerHTML"
  class="bg-white rounded-xl border border-gray-200 shadow-sm max-w-xl"
>
  <div class="px-6 py-4 border-b border-gray-100">
    <h2 class="text-sm font-semibold text-gray-700 uppercase tracking-wide">Reference Data</h2>
  </div>
  <div class="px-6 py-5 space-y-5 text-sm">

    <div>
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Electricity (City Power)</p>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1" for="elec_acct">Account number</label>
          <input type="text" id="elec_acct" name="electricity_account_number"
            value="{{ settings.electricity_account_number or '' }}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400"
            placeholder="e.g. 123456789" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1" for="elec_meter">Meter number</label>
          <input type="text" id="elec_meter" name="electricity_meter_number"
            value="{{ settings.electricity_meter_number or '' }}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400"
            placeholder="e.g. M0012345" />
        </div>
      </div>
    </div>

    <div class="border-t border-gray-100 pt-5">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-3">Water &amp; Sanitation (Johannesburg Water)</p>
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs text-gray-400 mb-1" for="water_acct">Account number</label>
          <input type="text" id="water_acct" name="water_account_number"
            value="{{ settings.water_account_number or '' }}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400"
            placeholder="e.g. 987654321" />
        </div>
        <div>
          <label class="block text-xs text-gray-400 mb-1" for="water_meter">Meter number</label>
          <input type="text" id="water_meter" name="water_meter_number"
            value="{{ settings.water_meter_number or '' }}"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono focus:outline-none focus:ring-2 focus:ring-indigo-400"
            placeholder="e.g. M0098765" />
        </div>
      </div>
    </div>

  </div>
  <div class="px-6 py-4 border-t border-gray-100 flex gap-3">
    <button type="submit"
      class="px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-lg hover:bg-indigo-700 transition-colors">
      Save
    </button>
    <button type="button"
      hx-get="/complex-info/view"
      hx-target="#complex-info-panel"
      hx-swap="innerHTML"
      class="px-4 py-2 text-gray-600 text-sm font-medium rounded-lg border border-gray-300 hover:bg-gray-50 transition-colors">
      Cancel
    </button>
  </div>
</form>
