{% extends "base.html" %}

{% block content %}

<a href="/units/{{ unit.id }}" class="text-sm text-gray-400 hover:text-gray-600 mb-6 inline-block">&larr; Back to Unit {{ unit.unit_number }}</a>

<div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm max-w-lg">

  <form method="post" action="/units/{{ unit.id }}/contacts/add" class="flex flex-col gap-5">

    <!-- Name -->
    <div>
      <label for="name" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Name <span class="text-red-400">*</span></label>
      <input type="text" id="name" name="name" required
             placeholder="Full name"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Phone -->
    <div>
      <label for="phone" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Phone</label>
      <input type="text" id="phone" name="phone"
             placeholder="e.g. 082 000 0000"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Email -->
    <div>
      <label for="email" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Email</label>
      <input type="email" id="email" name="email"
             placeholder="e.g. name@email.com"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Roles -->
    <div>
      <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2">Roles</label>
      <div class="flex flex-col gap-2">
        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
          <input type="checkbox" name="is_owner" value="true"
                 class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
          Owner
        </label>
        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
          <input type="checkbox" name="is_tenant" value="true"
                 class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
          Tenant
        </label>
        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
          <input type="checkbox" name="is_resident" value="true"
                 class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
          Resident
        </label>
        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
          <input type="checkbox" name="is_trustee" value="true"
                 class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
          Trustee
        </label>
      </div>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-blue-600 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-blue-700 transition-colors">
        Add contact
      </button>
      <a href="/units/{{ unit.id }}"
         class="text-sm font-medium text-gray-500 hover:text-gray-700 px-5 py-2 rounded-lg border border-gray-200 hover:bg-gray-50 transition-colors">
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
