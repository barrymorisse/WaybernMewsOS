{% extends "base.html" %}

{% block content %}

<a href="/units/{{ unit.id }}" class="text-sm text-gray-400 hover:text-gray-600 mb-6 inline-block">&larr; Back to Unit {{ unit.unit_number }}</a>

<div class="bg-white rounded-xl border border-gray-200 p-6 shadow-sm max-w-lg">

  <form method="post" action="/units/{{ unit.id }}/edit" class="flex flex-col gap-5">

    <!-- Unit number — read only -->
    <div>
      <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wide mb-1">Unit Number</label>
      <p class="text-gray-500 text-sm">{{ unit.unit_number }} <span class="text-gray-300">(cannot be changed)</span></p>
    </div>

    <!-- Description -->
    <div>
      <label for="description" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Description</label>
      <input type="text" id="description" name="description"
             value="{{ unit.description or '' }}"
             placeholder="e.g. Ground floor, east wing"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <!-- Participation quota -->
    <div>
      <label for="participation_quota" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">Participation Quota (%)</label>
      <input type="number" id="participation_quota" name="participation_quota"
             value="{{ "%.0f"|format(unit.participation_quota * 100) }}"
             min="0" max="100" step="0.01"
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p class="text-xs text-gray-400 mt-1">Enter as a percentage, e.g. 20 for 20%</p>
    </div>

    <!-- Buttons -->
    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-blue-600 text-white text-sm font-medium px-5 py-2 rounded-lg hover:bg-blue-700 transition-colors">
        Save changes
      </button>
      <a href="/units/{{ unit.id }}"
         class="text-sm font-medium text-gray-500 hover:text-gray-700 px-5 py-2 rounded-lg border border-gray-200 hover:bg-gray-50 transition-colors">
        Cancel
      </a>
    </div>

  </form>
</div>

{% endblock %}
