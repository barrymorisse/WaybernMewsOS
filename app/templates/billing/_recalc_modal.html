{# Confirmation modal for recalculating a billing period. #}
<div class="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50"
     id="recalc-modal-backdrop">
  <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 p-6">
    <h3 class="text-base font-semibold text-gray-800 mb-2">Recalculate billing?</h3>
    <p class="text-sm text-gray-500 mb-6">
      This will overwrite the existing calculation for
      <strong>{{ month_names[billing_month] }} {{ billing_year }}</strong>
      with a fresh run using the current meter readings and invoice data.
      This cannot be undone.
    </p>
    <div class="flex gap-3 justify-end">
      <button
        onclick="document.getElementById('modal-overlay').innerHTML = ''"
        class="px-4 py-2 text-sm text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 transition-colors">
        Cancel
      </button>
      <button
        hx-post="/utility-billing/{{ billing_year }}/{{ billing_month }}/recalculate"
        hx-target="#recalc-error-target"
        hx-swap="innerHTML"
        class="px-4 py-2 text-sm text-white bg-gray-800 rounded-lg hover:bg-gray-700 transition-colors">
        Yes, recalculate
      </button>
    </div>
    <div id="recalc-error-target" class="mt-3"></div>
  </div>
</div>
