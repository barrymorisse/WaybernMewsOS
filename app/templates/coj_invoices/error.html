{# HTMX partial — rendered into #results-area when parsing fails #}

<div class="bg-red-50 border border-red-300 rounded-xl p-5 mb-4">
  <div class="flex items-start gap-3">
    <svg class="h-5 w-5 text-red-500 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
    </svg>
    <div>
      <p class="text-sm font-semibold text-red-800 mb-1">Extraction failed</p>
      <p class="text-sm text-red-700">{{ error }}</p>
    </div>
  </div>
</div>

{% if raw_text %}
<details class="bg-white rounded-xl border border-gray-200 shadow-sm">
  <summary class="px-6 py-3 text-xs text-gray-400 cursor-pointer hover:text-gray-600 select-none">
    Raw extracted text (debug — what the LLM received)
  </summary>
  <div class="px-6 pb-5">
    <pre class="text-xs text-gray-500 bg-gray-50 rounded-lg p-4 overflow-x-auto whitespace-pre-wrap leading-relaxed">{{ raw_text }}</pre>
  </div>
</details>
{% endif %}
